<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; base-uri 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Accessible tic-tac-toe — solo vs AI or hot-seat." />
    <title>Tic-Tac-Toe</title>
  </head>
  <body>
    <header>
      <h1>Tic-Tac-Toe</h1>
    </header>
    <main id="app">
      <noscript>
        <section role="alert" class="ancient-browser-fallback">
          This game needs a modern browser. Try Firefox, Chrome, Safari, or Edge.
        </section>
      </noscript>
    </main>
    <!--
      Static no-ads trust footer (slice 07). Rendered directly in index.html
      rather than via lit-html so it's visible on first paint without waiting
      for JS, cannot shift layout as JS hydrates, and survives the ancient-
      browser fallback path (which replaces #app content but leaves the
      document-level footer intact).
    -->
    <footer class="site-footer" data-testid="site-footer">
      <p class="no-ads-copy">No ads. No signup. No tracking.</p>
      <a
        class="source-link"
        data-testid="source-link"
        href="https://github.com/dale-stewart/tic-tac-toe"
        target="_blank"
        rel="noopener noreferrer"
        >[source]</a
      >
    </footer>
    <div id="announce" role="status" aria-live="polite"></div>
    <script type="module" src="/src/adapters/bootstrap.ts"></script>
  </body>
</html>
