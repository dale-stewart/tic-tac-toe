# CI pipeline — tic-tac-toe
# Translation of docs/product/platform/ci-pipeline.md, gates per ADR-0007.
# 8 blocking per-PR gates + deploy on push to main.

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate 1 — install (shared setup)
  install:
    name: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile

  # Gate 2 — lint-and-typecheck
  lint-and-typecheck:
    name: lint-and-typecheck
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck

  # Gate 3 — unit-and-property
  unit-and-property:
    name: unit-and-property
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run test

  # Gate 4 — dependency-cruiser
  dependency-cruiser:
    name: dependency-cruiser
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run depcruise

  # Gate 4b — complexity (lizard via uvx)
  complexity:
    name: complexity
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uvx --from lizard lizard src -l typescript -C 10 -L 80 -a 5 -w

  # Gate 5 — build + artifact upload (feeds 6/7/8)
  build:
    name: build
    needs: [lint-and-typecheck, unit-and-property, dependency-cruiser, complexity]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-v${{ github.run_id }}
          path: dist/
          retention-days: 7

  # Gate 6 — bundle-size-check
  bundle-size:
    name: bundle-size
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: dist-v${{ github.run_id }}
          path: dist/
      - run: bun run size

  # Gate 7 — e2e-playwright (axe-core a11y + network-assertion run via Playwright)
  e2e-playwright:
    name: e2e-playwright
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: dist-v${{ github.run_id }}
          path: dist/
      - run: bun run test:e2e

  # Gate 8 — axe-core (re-asserts a11y independently of the broader e2e suite)
  axe-core:
    name: axe-core
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: dist-v${{ github.run_id }}
          path: dist/
      - run: bun run test:a11y

  # Gate 9 — lighthouse-ci
  lighthouse-ci:
    name: lighthouse-ci
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: dist-v${{ github.run_id }}
          path: dist/
      - run: bun run lhci

  # Deploy — main push only
  deploy:
    name: deploy
    needs:
      [
        lint-and-typecheck,
        unit-and-property,
        dependency-cruiser,
        complexity,
        build,
        bundle-size,
        e2e-playwright,
        axe-core,
        lighthouse-ci,
      ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-v${{ github.run_id }}
          path: dist/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/
      - id: deployment
        uses: actions/deploy-pages@v4
